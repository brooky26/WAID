environment: development

market_data:
  connection:
    rest_base_url: "https://api.derivws.com"
    ws_public_url: "wss://api.derivws.com/trading/v1/options/ws/public"
    ws_account_type: "demo"       # demo | real — only used when api_token is set
    app_id: "1089"                 # replace with your real Deriv app_id
    api_token: null                # set for authenticated access; null = public market data only
    account_id: null               # e.g. "DOT90004580" — required if api_token is set
    symbols:
      - "stpRNG"
      - "stpRNG2"
      - "stpRNG3"
      - "stpRNG4"
      - "stpRNG5"
    ping_interval_seconds: 20.0
    reconnect_initial_backoff_seconds: 1.0
    reconnect_max_backoff_seconds: 60.0
    reconnect_backoff_multiplier: 2.0
    max_reconnect_attempts: null
    request_timeout_seconds: 15.0

  historical:
    lookback_days: 30
    candle_granularity_seconds: 60
    request_count_max: 5000

  integrity:
    max_allowed_gap_seconds: 30.0
    max_price_jump_sigma: 12.0
    min_ticks_for_sigma_estimate: 200
    duplicate_timestamp_policy: "drop_duplicate"

  storage:
    backend: "sqlite"
    sqlite_path: "./data_store/ticks.db"
    write_batch_size: 500
    flush_interval_seconds: 2.0
